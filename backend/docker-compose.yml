version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: signal
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://signal:signal@postgres:5432/signal
      REDIS_URL: redis://redis:6379/0
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TRACKED_TICKERS: ${TRACKED_TICKERS:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.workers.run
    environment:
      DATABASE_URL: postgresql+psycopg://signal:signal@postgres:5432/signal
      REDIS_URL: redis://redis:6379/0
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
